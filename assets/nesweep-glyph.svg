<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>NESweep glyph (source for nesweep-icons.woff2)</title>
  <g fill="black">
    <!-- I-beam text caret: bold serifs + stem, fills ~88% of EM vertically -->
    <rect x="160" y="80" width="320" height="100" rx="20"/>
    <rect x="270" y="80" width="100" height="864" rx="20"/>
    <rect x="160" y="844" width="320" height="100" rx="20"/>
  </g>
  <!-- Chevron > as stroked polyline; fontforge converts stroke to filled outline on import -->
  <polyline points="580,120 900,512 580,904"
            fill="none" stroke="black" stroke-width="110"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
